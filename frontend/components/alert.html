<!-- ================= ALERT ================= -->
<style>
    .modern-table {
        width: 100%;
        border-collapse: collapse;
    }

    .modern-table th {
        padding: 15px 25px;
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
        text-align: left;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        color: #475569;
    }

    .modern-table td {
        padding: 15px 25px;
        text-align: left;
        border-bottom: 1px solid #f1f5f9;
        font-size: 14px;
        color: #334155;
    }

    .modern-table tbody tr:hover {
        background: #f4f8fb;
    }
</style>

<div id="alert" class="page">
    <div class="container">

        <!-- Header Banner -->
        <div class="welcome-banner"
            style="background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; padding: 25px 30px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(239,68,68,0.2);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div
                    style="background: rgba(255,255,255,0.2); width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px;">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <div>
                    <h2 style="font-size: 24px; margin-bottom: 5px;">Alert Monitoring</h2>
                    <p style="font-size: 14px; opacity: 0.9;">Pusat kendali dan riwayat peringatan sistem SSCS</p>
                </div>
            </div>

            <div style="background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px; text-align: center;">
                <p style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Status
                    Respon</p>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-weight: 600;"><i class="fa-solid fa-shield-halved"
                            style="margin-right: 5px;"></i>Siaga Penuh</span>
                </div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
            <div
                style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <div
                    style="width: 55px; height: 55px; border-radius: 12px; background: #e2e8f0; color: #475569; display: flex; align-items: center; justify-content: center; font-size: 22px;">
                    <i class="fa-solid fa-bell"></i>
                </div>
                <div>
                    <p style="color: #64748b; font-size: 13px; font-weight: 600; margin-bottom: 4px;">Total Alert</p>
                    <h2 id="totalAlert" style="font-size: 30px; color: #0f172a;">0</h2>
                </div>
            </div>

            <div
                style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <div
                    style="width: 55px; height: 55px; border-radius: 12px; background: #fef08a; color: #ca8a04; display: flex; align-items: center; justify-content: center; font-size: 22px;">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <div>
                    <p style="color: #64748b; font-size: 13px; font-weight: 600; margin-bottom: 4px;">Active Alert</p>
                    <h2 id="activeAlert" style="font-size: 30px; color: #0f172a;">0</h2>
                </div>
            </div>

            <div
                style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <div
                    style="width: 55px; height: 55px; border-radius: 12px; background: #fecaca; color: #dc2626; display: flex; align-items: center; justify-content: center; font-size: 22px;">
                    <i class="fa-solid fa-circle-exclamation"></i>
                </div>
                <div>
                    <p style="color: #64748b; font-size: 13px; font-weight: 600; margin-bottom: 4px;">Critical</p>
                    <h2 id="criticalAlert" style="font-size: 30px; color: #0f172a;">0</h2>
                </div>
            </div>
        </div>

        <!-- Tables Layout -->
        <div style="display: grid; grid-template-columns: 1fr; gap: 25px;">

            <!-- Active Alerts Table -->
            <div
                style="background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.02); overflow: hidden;">
                <div
                    style="padding: 20px 25px; border-bottom: 1px solid #e2e8f0; background: #ffffff; display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-size: 16px; color: #1e293b; display: flex; align-items: center;">
                        <span
                            style="background: #fef2f2; width: 32px; height: 32px; display: inline-flex; justify-content: center; align-items: center; border-radius: 8px; margin-right: 12px;">
                            <i class="fa-solid fa-bolt" style="color: #ef4444; font-size: 14px;"></i>
                        </span>
                        Active Alerts
                    </h3>
                    <span
                        style="background: #fef2f2; color: #ef4444; font-size: 12px; padding: 6px 12px; border-radius: 20px; font-weight: 600;">Action
                        Required</span>
                </div>
                <div style="padding: 0; overflow-x: auto;">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Kapal</th>
                                <th>IMO</th>
                                <th>Jenis</th>
                                <th>Level</th>
                                <th>Waktu</th>
                                <th>Durasi</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="alertList"></tbody>
                    </table>
                </div>
            </div>

            <!-- Alert History Table -->
            <div
                style="background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.02); overflow: hidden;">
                <div
                    style="padding: 20px 25px; border-bottom: 1px solid #e2e8f0; background: #ffffff; display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-size: 16px; color: #1e293b; display: flex; align-items: center;">
                        <span
                            style="background: #f1f5f9; width: 32px; height: 32px; display: inline-flex; justify-content: center; align-items: center; border-radius: 8px; margin-right: 12px;">
                            <i class="fa-solid fa-clock-rotate-left" style="color: #64748b; font-size: 14px;"></i>
                        </span>
                        Resolve Alert History
                    </h3>
                    <span
                        style="background: #f1f5f9; color: #64748b; font-size: 12px; padding: 6px 12px; border-radius: 20px; font-weight: 600;">Resolved</span>
                </div>
                <div style="padding: 0; overflow-x: auto;">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Kapal</th>
                                <th>Level</th>
                                <th>Resolved At</th>
                            </tr>
                        </thead>
                        <tbody id="alertHistoryList"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- ================= MODAL ALERT DETAIL ================= -->
    <div id="alertDetailModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 20px;">
        <div id="alertDetailContent" style="background: white; border-radius: 12px; width: 600px; max-width: 100%; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: flex; flex-direction: column; animation: fadeIn 0.15s ease-out;">
            <!-- Filled dynamically -->
        </div>
    </div>
</div>
