<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSCS Monitoring Dashboard — Smart Shore Connection System</title>
    <meta name="description" content="Sistem pemantauan cerdas penggunaan energi listrik dari darat ke kapal di pelabuhan.">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- ================= NAVBAR PLACEHOLDER ================= -->
    <div id="navbar-placeholder"></div>

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboard-placeholder"></div>

    <!-- ================= MONITORING ================= -->
    <div id="monitoring-placeholder"></div>

    <!-- ================= HISTORY ================= -->
    <div id="history-placeholder"></div>

    <!-- ================= ALERT ================= -->
    <div id="alert-placeholder"></div>

    <!-- ================= LAPORAN ================= -->
    <div id="laporan-placeholder"></div>

    <!-- ================= PLANNING ================= -->
    <div id="planning-placeholder"></div>

    <!-- ================= MODAL ALERT POPUP ================= -->
    <div id="alertModal" class="modal" style="display:none;z-index:10000;position:fixed;right:20px;top:20px;width:auto;height:auto;">
        <!-- Filled by showAlert() in app.js -->
    </div>

    <!-- ================= TOAST NOTIFICATION ================= -->
    <div id="toastNotification" class="toast-notification">
        <div class="toast-content">
            <i id="toastIcon" class="fa-solid fa-circle-check"></i>
            <span id="toastMessage">Notifikasi</span>
        </div>
        <button onclick="closeToast()" class="toast-close"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
