<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Login - Sistem Monitoring Energi</title>
    <link rel="stylesheet" href="login.css">
    <!-- Include Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="login-page-wrapper">
        <div class="login-card-container">

            <!-- LEFT PANEL -->
            <div class="left-panel">
                <div class="left-header">
                    <img src="../assets/img/Logo.jpeg" alt="Power Shore Connection" class="logo-danantara">
                </div>

                <div class="feature-list-container">
                    <ul class="feature-list">
                        <li><i class="fa-solid fa-anchor"></i> Integrated Port Management</li>
                        <li><i class="fa-solid fa-chart-line"></i> Real-time Monitoring</li>
                        <li><i class="fa-solid fa-shield-halved"></i> Secure & Reliable</li>
                        <li><i class="fa-solid fa-users"></i> Professional Support</li>
                    </ul>
                </div>

                <div class="left-footer">
                    <p><strong>Support Helpdesk:</strong> 0.800.11.99999 (Free Call)</p>
                    <p>© 2026 Power Shore Connection</p>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">
                <div class="form-container">
                    <div class="welcome-text">
                        <h2>Welcome Back</h2>
                        <p>Please sign in to your account</p>
                    </div>

                    <div id="loginError" class="alert-box" style="display: none;">
                        Security verification failed. Please try again.
                    </div>

                    <form id="loginForm">
                        <div class="input-group">
                            <label>Username</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-user input-icon"></i>
                                <input type="text" id="username" placeholder="Enter your username" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock input-icon"></i>
                                <input type="password" id="password" placeholder="Enter your password" required>
                                <i class="fa-regular fa-eye toggle-password" onclick="togglePassword()"></i>
                            </div>
                        </div>

                        <button type="submit" id="loginBtn" class="login-btn" disabled>Sign In</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
