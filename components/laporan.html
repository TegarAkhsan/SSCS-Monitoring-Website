<!-- ================= LAPORAN ================= -->
<style>
    .modern-table {
        width: 100%;
        border-collapse: collapse;
    }

    .modern-table th {
        padding: 15px 25px;
        color: #64748b;
        font-size: 13px;
        font-weight: 600;
        text-align: left;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        color: #475569;
    }

    .modern-table td {
        padding: 15px 25px;
        text-align: left;
        border-bottom: 1px solid #f1f5f9;
        font-size: 14px;
        color: #334155;
    }

    .modern-table tbody tr:hover {
        background: #f4f8fb;
    }

    .report-search {
        padding: 12px 20px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        color: #334155;
        font-size: 14px;
        width: 100%;
        max-width: 400px;
        outline: none;
        transition: all 0.2s;
    }

    .report-search:focus {
        border-color: #256b9c;
        background: white;
        box-shadow: 0 0 0 3px rgba(37, 107, 156, 0.1);
    }

    .btn-download-all {
        padding: 12px 20px;
        background: #0ea5e9;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
        box-shadow: 0 4px 6px rgba(14, 165, 233, 0.2);
    }

    .btn-download-all:hover {
        background: #0284c7;
        transform: translateY(-1px);
        box-shadow: 0 6px 10px rgba(14, 165, 233, 0.3);
    }
</style>

<div id="laporan" class="page">
    <div class="container">

        <!-- Header Banner -->
        <div class="welcome-banner"
            style="background: linear-gradient(135deg, #0ea5e9, #0369a1); color: white; padding: 25px 30px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.2);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div
                    style="background: rgba(255,255,255,0.2); width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px;">
                    <i class="fa-solid fa-file-export"></i>
                </div>
                <div>
                    <h2 style="font-size: 24px; margin-bottom: 5px;">Laporan Kapal</h2>
                    <p style="font-size: 14px; opacity: 0.9;">Unduh laporan detail pemakaian energi dan reduksi emisi
                    </p>
                </div>
            </div>
            <div>
                <button onclick="downloadReport()" class="btn-download-all">
                    <i class="fa-solid fa-download"></i> Unduh Semua (24 Jam)
                </button>
            </div>
        </div>

        <!-- Table Card -->
        <div
            style="background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.02); overflow: hidden;">

            <!-- Toolbar -->
            <div
                style="padding: 20px 25px; border-bottom: 1px solid #e2e8f0; background: #ffffff; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <h3 style="font-size: 16px; color: #1e293b; display: flex; align-items: center;">
                    <span
                        style="background: #f0f9ff; width: 32px; height: 32px; display: inline-flex; justify-content: center; align-items: center; border-radius: 8px; margin-right: 12px;">
                        <i class="fa-solid fa-ship" style="color: #0ea5e9; font-size: 14px;"></i>
                    </span>
                    Daftar Kapal Tersedia
                </h3>

                <div style="display: flex; align-items: center; position: relative;">
                    <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 15px; color: #94a3b8;"></i>
                    <input type="text" id="searchReportShip" placeholder="Cari Nama Kapal atau IMO..."
                        onkeyup="filterReportShips()" class="report-search" style="padding-left: 40px;">
                </div>
            </div>

            <!-- Table -->
            <div style="padding: 0; overflow-x: auto;">
                <table class="modern-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Kapal</th>
                            <th>IMO</th>
                            <th>Tipe</th>
                            <th style="text-align: center;">Aksi Laporan</th>
                        </tr>
                    </thead>
                    <tbody id="reportShipCardsContainer">
                        <!-- Data will be populated by JS -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
