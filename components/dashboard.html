<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="page active">
    <!-- Notice I add 'active' so it shows by default -->
    <div class="container">

        <!-- Welcome Banner -->
        <div class="welcome-banner"
            style="background: linear-gradient(135deg, #256b9c, #1e3a5f); color: white; padding: 25px 30px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <div>
                <h2 style="font-size: 28px; margin-bottom: 8px;">Hello Admin 👋</h2>
                <p style="font-size: 15px; opacity: 0.9;">Selamat bertugas memantau Power Shore Connection hari ini!</p>
            </div>
            <div style="background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px;">
                <p style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Status
                    Sistem</p>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span
                        style="width: 10px; height: 10px; background: #4ade80; border-radius: 50%; display: inline-block;"></span>
                    <span style="font-weight: 600;">Online & Aman</span>
                </div>
            </div>
        </div>

        <!-- Global Stats Row (4 Cards) -->
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;">

            <div
                style="background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <div
                    style="width: 50px; height: 50px; border-radius: 12px; background: #f1f5f9; color: #475569; display: flex; align-items: center; justify-content: center; font-size: 20px;">
                    <i class="fa-solid fa-anchor"></i>
                </div>
                <div>
                    <p style="color: #64748b; font-size: 13px; font-weight: 600; margin-bottom: 5px;">Total Kapal</p>
                    <h2 id="globalTotalKapal" style="font-size: 28px; color: #0f172a;">6</h2>
                </div>
            </div>

            <div
                style="background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <div
                    style="width: 50px; height: 50px; border-radius: 12px; background: #e0f2fe; color: #0284c7; display: flex; align-items: center; justify-content: center; font-size: 20px;">
                    <i class="fa-solid fa-ship"></i>
                </div>
                <div>
                    <p style="color: #64748b; font-size: 13px; font-weight: 600; margin-bottom: 5px;">Kapal Terhubung
                    </p>
                    <h2 id="globalKapalTerhubung" style="font-size: 28px; color: #0f172a;">0</h2>
                </div>
            </div>

            <div
                style="background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <div
                    style="width: 50px; height: 50px; border-radius: 12px; background: #fff7ed; color: #ea580c; display: flex; align-items: center; justify-content: center; font-size: 20px;">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <div>
                    <p style="color: #64748b; font-size: 13px; font-weight: 600; margin-bottom: 5px;">Total Energi
                        (Real-Time)</p>
                    <h2 id="globalRealtimeEnergy" style="font-size: 28px; color: #0f172a;">0 kWh</h2>
                </div>
            </div>

            <div
                style="background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <div
                    style="width: 50px; height: 50px; border-radius: 12px; background: #dcfce7; color: #16a34a; display: flex; align-items: center; justify-content: center; font-size: 20px;">
                    <i class="fa-solid fa-leaf"></i>
                </div>
                <div>
                    <p style="color: #64748b; font-size: 13px; font-weight: 600; margin-bottom: 5px;">Reduksi Emisi CO₂
                    </p>
                    <h2 id="globalCO2Saved" style="font-size: 28px; color: #0f172a;">0.00 kg</h2>
                </div>
            </div>

        </div>

        <!-- Chart Section -->
        <div
            style="background: white; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.02); padding: 30px;">
            <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3 style="font-size: 18px; color: #1e293b; margin-bottom: 5px;">Grafik Konsumsi Energi Global</h3>
                    <p style="font-size: 13px; color: #64748b;">Akumulasi konsumsi daya dari seluruh kapal terhubung</p>
                </div>
            </div>
            <div style="height: 400px; width: 100%; border: 1px solid #f1f5f9; border-radius: 8px; padding: 20px;">
                <canvas id="dashboardChart"></canvas>
            </div>
        </div>

    </div>
</div>
