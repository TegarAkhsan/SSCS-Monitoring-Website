<style>
    /* ================= SIDEBAR NAVBAR ================= */
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 80px;
        background: #256b9c;
        /* Primary blue */
        display: flex;
        flex-direction: column;
        padding-top: 25px;
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1000;
        overflow: hidden;
        box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
    }

    .sidebar:hover {
        width: 250px;
    }

    .sidebar-header {
        display: flex;
        align-items: center;
        padding: 0 20px;
        margin-bottom: 30px;
        min-width: 250px;
    }

    .sidebar-header img {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: white;
        padding: 4px;
        object-fit: contain;
    }

    .sidebar-header h2 {
        color: white;
        font-size: 18px;
        margin-left: 15px;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .sidebar:hover .sidebar-header h2 {
        opacity: 1;
        transition-delay: 0.1s;
    }

    .sidebar-menu {
        display: flex;
        flex-direction: column;
        width: 100%;
        min-width: 250px;
        flex: 1;
        /* Take remaining height */
    }

    .sidebar-menu a,
    .sidebar-menu button {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        color: #cbd5e1;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        transition: all 0.2s ease;
        border: none;
        background: transparent;
        cursor: pointer;
        text-align: left;
        border-left: 4px solid transparent;
    }

    .sidebar-menu a i,
    .sidebar-menu button i {
        font-size: 18px;
        width: 40px;
        text-align: center;
    }

    .sidebar-menu a span,
    .sidebar-menu button span {
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.2s ease;
    }

    .sidebar:hover .sidebar-menu a span,
    .sidebar:hover .sidebar-menu button span {
        opacity: 1;
        transition-delay: 0.1s;
    }

    .sidebar-menu a:hover,
    .sidebar-menu a.active {
        color: white;
        background: rgba(255, 255, 255, 0.1);
        border-left: 4px solid white;
    }

    .sidebar-menu .logout-btn {
        margin-top: auto;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 20px;
    }

    .sidebar-menu .logout-btn:hover {
        color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        border-left: 4px solid #ef4444;
    }

    /* Page margin fix to accommodate the fixed sidebar */
    body {
        padding-left: 80px;
        /* Offset for collapsed sidebar */
        margin: 0;
    }
</style>

<aside class="sidebar" id="main-navbar">
    <div class="sidebar-header">
        <img src="../assets/img/Logo.jpeg" alt="Logo">
        <h2>SSCS Dashboard</h2>
    </div>
    <div class="sidebar-menu">
        <a href="#" onclick="showPage('dashboard')" class="active" id="nav-dashboard">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Dashboard</span>
        </a>
        <a href="#" onclick="showPage('monitoring')" id="nav-monitoring">
            <i class="fa-solid fa-desktop"></i>
            <span>Monitoring</span>
        </a>
        <a href="#" onclick="showPage('history')" id="nav-history">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>History</span>
        </a>
        <a href="#" onclick="showPage('alert')" id="nav-alert">
            <i class="fa-solid fa-bell"></i>
            <span>Alert</span>
        </a>
        <a href="#" onclick="showPage('laporan')" id="nav-laporan">
            <i class="fa-solid fa-file-lines"></i>
            <span>Laporan</span>
        </a>
        <a href="#" onclick="showPage('planning')" id="nav-planning">
            <i class="fa-solid fa-calendar-alt"></i>
            <span>Planning</span>
        </a>

        <button onclick="logout()" class="logout-btn">
            <i class="fa-solid fa-sign-out-alt"></i>
            <span>Logout</span>
        </button>
    </div>
</aside>
