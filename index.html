<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>SSCS Monitoring Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css?v=2">

    <!-- Include Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- ================= NAVBAR PLACEHOLDER ================= -->
    <div id="navbar-placeholder"></div>


    <!-- ================= DAFTAR KAPAL (REMOVED) ================= -->

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboard-placeholder"></div>

    <!-- ================= MONITORING ================= -->
    <div id="monitoring-placeholder"></div>

    <!-- ================= HISTORY ================= -->
    <div id="history-placeholder"></div>

    <!-- ================= ALERT ================= -->
    <div id="alert-placeholder"></div>

    <!-- ================= LAPORAN ================= -->
    <div id="laporan-placeholder"></div>

    <!-- ================= PLANNING ================= -->
    <div id="planning-placeholder"></div>



    <!-- ================= MODAL ALERT ================= -->
    <div id="alertModal" class="modal" style="display: none; z-index: 10000; position: fixed; right: 20px; top: 20px; width: auto; height: auto;">
        <!-- Filled dynamically by showAlert in app.js -->
    </div>

    <!-- ================= TOAST NOTIFICATION ================= -->
    <div id="toastNotification" class="toast-notification">
        <div class="toast-content">
            <i id="toastIcon" class="fa-solid fa-circle-check"></i>
            <span id="toastMessage">Notifikasi</span>
        </div>
        <button onclick="closeToast()" class="toast-close"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- ================= SCRIPT ================= -->
    <script src="js/app.js?v=2"></script>

</body>

</html>
